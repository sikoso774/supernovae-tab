name: Release Obsidian Plugin (Beta)

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+-beta[0-9]*"
  workflow_dispatch:

env:
  PLUGIN_NAME: supernovae-tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Get version from manifest
        id: version
        run: echo "VERSION=$(jq -r '.version' manifest.json)" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          npm ci
          npm run build
          zip -jr ${{ env.PLUGIN_NAME }}-${{ steps.version.outputs.VERSION }}.zip \
            dist/main.js dist/styles.css dist/manifest.json

      - name: Create GitHub Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ steps.version.outputs.VERSION }}
          prerelease: true
          generate_release_notes: true
          files: |
            ${{ env.PLUGIN_NAME }}-${{ steps.version.outputs.VERSION }}.zip
            dist/main.js
            dist/styles.css
            dist/manifest.json
