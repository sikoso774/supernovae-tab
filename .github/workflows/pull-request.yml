name: Build Pull Request

on: pull_request

env:
  PLUGIN_NAME: obsidian-tab-galaxy

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Build
        run: |
          npm ci
          npm run build
          zip -r ${{ env.PLUGIN_NAME }}.zip dist
